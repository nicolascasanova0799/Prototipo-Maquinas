<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Plataforma de Gestión de Equipos Refrigerados | Isstec</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-marino: #001F3F;
            --azul-primario: #0066CC;
            --naranja-coral: #FF6B35;
            --verde-exito: #28A745;
            --gris-claro: #F0F2F5;
            --gris-medio: #6C757D;
            --gris-oscuro: #343A40;
            --rojo-error: #DC3545;
        }

        * {
            font-family: 'Inter', 'Open Sans', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--azul-marino) 0%, #003366 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .login-card {
            background: #FFFFFF;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            max-width: 440px;
            width: 100%;
            padding: 40px 36px;
        }

        .login-logo {
            height: 60px;
            display: block;
            margin: 0 auto 20px;
        }

        .login-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--azul-marino);
            text-align: center;
            margin-bottom: 28px;
            line-height: 1.4;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--gris-oscuro);
            margin-bottom: 6px;
        }

        .form-control {
            border: 1px solid #DEE2E6;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 14px;
            color: #333333;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .form-control:focus {
            border-color: var(--azul-primario);
            box-shadow: 0 0 0 0.2rem rgba(0, 102, 204, 0.15);
        }

        .form-control::placeholder {
            color: var(--gris-medio);
        }

        .input-group-text {
            background: var(--gris-claro);
            border: 1px solid #DEE2E6;
            color: var(--gris-medio);
            border-radius: 6px 0 0 6px;
        }

        .input-group .form-control {
            border-radius: 0 6px 6px 0;
        }

        .role-toggle {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .role-option {
            flex: 1;
            position: relative;
        }

        .role-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .role-option label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 14px 8px;
            border: 2px solid #DEE2E6;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 13px;
            font-weight: 600;
            color: var(--gris-medio);
            text-align: center;
            margin: 0;
        }

        .role-option label i {
            font-size: 22px;
        }

        .role-option input[type="radio"]:checked + label {
            border-color: var(--azul-primario);
            background: rgba(0, 102, 204, 0.05);
            color: var(--azul-primario);
        }

        .role-option label:hover {
            border-color: var(--azul-primario);
        }

        .btn-primary {
            background-color: var(--azul-primario);
            border-color: var(--azul-primario);
            border-radius: 6px;
            font-weight: 600;
            font-size: 15px;
            padding: 11px;
            width: 100%;
            transition: background-color 0.15s;
        }

        .btn-primary:hover {
            background-color: #0052a3;
            border-color: #0052a3;
        }

        .btn-primary:disabled {
            background-color: var(--gris-claro);
            border-color: var(--gris-claro);
            color: var(--gris-medio);
        }

        .password-toggle {
            cursor: pointer;
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--gris-medio);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="assets/img/logo_white.png" alt="Isstec" class="login-logo">
        <h1 class="login-title">Plataforma de Gestión de<br>Equipos Refrigerados</h1>

        <form id="loginForm" novalidate>
            <div class="mb-3">
                <label for="email" class="form-label">RUT</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="email" placeholder="12.345.678-9" value="18.726.394-5" required>
                </div>
                <div class="invalid-feedback" style="font-size: 12px;">
                    Ingresa un RUT válido.
                </div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" placeholder="••••••••" value="password" required>
                    <span class="input-group-text password-toggle" onclick="togglePassword()">
                        <i class="bi bi-eye" id="passwordIcon"></i>
                    </span>
                </div>
                <div class="invalid-feedback" style="font-size: 12px;">
                    Ingresa tu contraseña.
                </div>
            </div>

            <div class="role-toggle">
                <div class="role-option">
                    <input type="radio" id="rolMandante" name="rol" value="mandante" checked>
                    <label for="rolMandante">
                        <i class="bi bi-building"></i>
                        Mandante
                    </label>
                </div>
                <div class="role-option">
                    <input type="radio" id="rolDistribuidor" name="rol" value="distribuidor">
                    <label for="rolDistribuidor">
                        <i class="bi bi-truck"></i>
                        Distribuidor
                    </label>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" id="btnIngresar">
                Ingresar
            </button>
        </form>

        <div class="login-footer">
            &copy; 2025 Isstec — Integración de Sistemas y Servicios Tecnológicos
        </div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('passwordIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email');
            const password = document.getElementById('password');
            let valid = true;

            [email, password].forEach(function(field) {
                if (!field.value.trim()) {
                    field.classList.add('is-invalid');
                    valid = false;
                } else {
                    field.classList.remove('is-invalid');
                }
            });

            if (email.value.trim() && !email.value.match(/^\d{1,2}\.\d{3}\.\d{3}-[\dkK]$/)) {
                email.classList.add('is-invalid');
                valid = false;
            }

            if (!valid) return;

            const rol = document.querySelector('input[name="rol"]:checked').value;
            if (rol === 'mandante') {
                window.location.href = 'mandante/dashboard.html';
            } else {
                window.location.href = 'distribuidor/dashboard.html';
            }
        });

        document.getElementById('email').addEventListener('input', function() {
            this.classList.remove('is-invalid');
        });
        document.getElementById('password').addEventListener('input', function() {
            this.classList.remove('is-invalid');
        });
    </script>
</body>
</html>
